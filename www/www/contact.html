<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | FourSight</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../src/css/MyStyle.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">FourSight</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="index.html">Home</a>
                <a class="nav-link" href="about.html">About</a>
                <a class="nav-link active" href="contact.html">Contact</a>
                <a class="nav-link" href="product.html">Products</a>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="game-box p-5 mx-auto text-start">
            <h2 class="mb-4">Contact Our Team</h2>
            
            <form>
                <div class="mb-3">
                    <label class="form-label">Name</label>
                    <input type="text" class="form-control">
                </div>
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-control">
                </div>
                <div class="mb-3">
                    <label class="form-label">Message</label>
                    <textarea class="form-control" rows="3"></textarea>
                </div>
                <button type="button" class="btn btn-primary w-100 fw-bold">Send</button>
            </form>
        </div>
    </div>

    <footer class="text-center text-white mt-5 p-4" style="background-color: #05141b; border-top: 2px solid #5a189a;">
        <p class="mb-1">Developers: Talal Yousef Alhawi, Abdullah Waleed Alkharji, Ali Alghamdi</p>

        <p class="mb-0">&copy;Alyamamah University 2026</p>
    </footer>
